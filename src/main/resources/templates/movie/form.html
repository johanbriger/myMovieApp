<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ny Film</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h1>Lägg till ny film</h1>

<form th:action="@{/movies}" th:object="${movieForm}" method="post">

    <div class="mb-3">
        <label>Titel</label>
        <input type="text" th:field="*{title}" class="form-control"
               th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
        <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Fel</div>
    </div>

    <div class="mb-3">
        <label>Regissör</label>
        <input type="text" th:field="*{director}" class="form-control"
               th:classappend="${#fields.hasErrors('director')} ? 'is-invalid'">
        <div class="invalid-feedback" th:errors="*{director}"></div>
    </div>

    <div class="mb-3">
        <label>Utgivningsdatum</label>
        <input type="date" id="releaseDate" name="releaseDate"
                th:value="${movieForm.releaseDate != null ? #temporals.format(movieForm.releaseDate, 'yyyy-MM-dd') : ''}"
                class="form-control"
                th:classappend="${#fields.hasErrors('releaseDate')} ? 'is-invalid'">
        <div class="invalid-feedback" th:errors="*{releaseDate}"></div>
    </div>

    <div class="mb-3">
        <label>Längd (min)</label>
        <input type="number" th:field="*{durationMinutes}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Beskrivning</label>
        <textarea th:field="*{description}" class="form-control"></textarea>
    </div>

    <button type="submit" class="btn btn-success">Spara</button>
    <a href="/movies" class="btn btn-secondary">Avbryt</a>
</form>
</body>
</html>

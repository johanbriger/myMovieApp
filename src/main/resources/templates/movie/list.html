<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <title>myMovieDatabase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

    <style>
        h1, .display-4 {
            font-family: 'Montserrat', sans-serif;
            letter-spacing: -1px;
            text-transform: lowercase;
        }

        .table-hover tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
            transition: background-color 0.3s ease;
        }

        .btn-info {
            color: white;
        }
    </style>
</head>
<body class="bg-dark text-light">

<div class="container py-5">

    <header class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h1 class="display-4 fw-800 text-info mb-0">myMovie<span class="text-white">Database</span></h1>
            <p class="text-secondary">Din personliga filmsamling</p>
        </div>
        <a href="/movies/new" class="btn btn-success btn-lg shadow">
            <i class="bi bi-plus-circle me-2"></i>Ny film
        </a>
    </header>

    <div class="row mb-4">
        <div class="col-md-6">
            <form action="/movies" method="get" class="d-flex gap-2">
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" name="search" th:value="${search}" class="form-control border-secondary" placeholder="Sök efter titel...">
                    <button type="submit" class="btn btn-primary px-4">Sök</button>
                    <a th:if="${search != null}" href="/movies" class="btn btn-outline-secondary">Rensa</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card bg-dark border-secondary shadow shadow-sm">
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle mb-0">
                <thead class="table-light text-dark">
                <tr>
                    <th class="ps-4">Titel</th>
                    <th>Regissör</th>
                    <th>Datum</th>
                    <th>Längd</th>
                    <th class="text-end pe-4">Åtgärder</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="movie : ${movies}">
                    <td class="ps-4 fw-bold" th:text="${movie.title}">Titel</td>
                    <td th:text="${movie.director}">Regissör</td>
                    <td th:text="${movie.releaseDate}">2023-01-01</td>
                    <td>
                        <span class="badge bg-secondary" th:text="${movie.durationMinutes} + ' min'">90 min</span>
                    </td>
                    <td class="text-end pe-4">
                        <div class="btn-group shadow-sm">
                            <a th:href="@{/movies/{id}(id=${movie.id})}" class="btn btn-sm btn-info" title="Visa detaljer">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/movies/{id}/edit(id=${movie.id})}" class="btn btn-sm btn-warning" title="Redigera">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/movies/{id}/delete(id=${movie.id})}"
                               onclick="return confirm('Vill du verkligen ta bort denna film?')"
                               class="btn btn-sm btn-danger" title="Ta bort">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link bg-dark border-secondary text-light"
                   th:href="@{/movies(page=${i}, search=${search})}"
                   th:text="${i + 1}">1</a>
            </li>
        </ul>
    </nav>
</div>

</body>
</html>

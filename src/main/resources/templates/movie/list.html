<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Filmlista</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h1>Alla Filmer</h1>

<form action="/movies" method="get" class="mb-3 d-flex gap-2">
    <input type="text" name="search" th:value="${search}" class="form-control" placeholder="Sök på titel...">
    <button type="submit" class="btn btn-primary">Sök</button>
    <a href="/movies" class="btn btn-secondary">Rensa</a>
</form>

<a href="/movies/new" class="btn btn-success mb-3">Lägg till ny film</a>

<table class="table table-striped">
    <thead>
    <tr>
        <th>Titel</th>
        <th>Regissör</th>
        <th>Datum</th>
        <th>Längd</th>
        <th>Åtgärder</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="movie : ${movies}">
        <td th:text="${movie.title}">Titel</td>
        <td th:text="${movie.director}">Regissör</td>
        <td th:text="${movie.releaseDate}">2023-01-01</td>
        <td th:text="${movie.durationMinutes} + ' min'">90 min</td>
        <td>
            <a th:href="@{/movies/{id}/edit(id=${movie.id})}" class="btn btn-sm btn-warning">Redigera</a>
            <a th:href="@{/movies/{id}/delete(id=${movie.id})}"
               onclick="return confirm('Är du säker?')"
               class="btn btn-sm btn-danger">Ta bort</a>
        </td>
    </tr>
    </tbody>
</table>

<nav th:if="${totalPages > 1}">
    <ul class="pagination">
        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
            th:classappend="${i == currentPage} ? 'active'">
            <a class="page-link" th:href="@{/movies(page=${i}, search=${search})}" th:text="${i + 1}">1</a>
        </li>
    </ul>
</nav>
</body>
</html>
